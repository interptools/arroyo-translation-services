<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#1a2744;--navy2:#243560;
    --gold:#c9a84c;--goldl:#e8c97a;
    --cream:#faf8f4;--white:#fff;
    --text:#1a2744;--muted:#6b7280;--border:#e5e0d8;--bdr2:#ccc7bc;
    --green:#16a34a;--gbg:#f0fdf4;--gbr:#bbf7d0;
    --red:#dc2626;--rbg:#fef2f2;--rbr:#fecaca;
    --amber:#d97706;--abg:#fffbeb;--abr:#fde68a;
    --blue:#2563eb;--bbg:#eff6ff;--bbr:#bfdbfe;
    --purple:#7c3aed;--pbg:#f5f3ff;--pbr:#ddd6fe;
  }
  body{font-family:'Inter',sans-serif;background:#f1ede8;color:var(--text);min-height:100vh}

  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:36px;width:100%;max-width:340px;text-align:center}
  .login-card h2{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);margin-bottom:4px}
  .login-card p{font-size:12px;color:var(--muted);margin-bottom:20px}
  .login-card input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;margin-bottom:10px;outline:none}
  .login-card input:focus{border-color:var(--navy)}
  .login-btn{width:100%;padding:11px;background:var(--navy);color:var(--goldl);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer}
  .login-err{font-size:11px;color:var(--red);margin-top:6px;display:none}

  #main-app{display:none}
  header{background:var(--navy);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo-name{font-family:'DM Serif Display',serif;color:var(--goldl);font-size:17px}
  .logo-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase}
  .admin-badge{background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.35);color:var(--goldl);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
  .sign-out{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.55);font-family:'Inter',sans-serif;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer}

  .stats-bar{display:flex;gap:10px;padding:18px 24px 0;flex-wrap:wrap}
  .stat-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px 18px;flex:1;min-width:110px}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .stat-num{font-family:'DM Serif Display',serif;font-size:26px;color:var(--navy)}
  .stat-num.amber{color:var(--amber)}.stat-num.green{color:var(--green)}.stat-num.navy{color:var(--navy)}

  .table-wrap{margin:16px 24px;background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden}
  .table-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .table-title{font-size:13px;font-weight:600;color:var(--navy)}
  .refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer}
  .refresh-btn:hover{border-color:var(--navy);color:var(--navy)}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .fbtn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;background:var(--cream);color:var(--muted);transition:all .15s}
  .fbtn.active{background:var(--navy);color:var(--goldl);border-color:var(--navy)}
  table{width:100%;border-collapse:collapse}
  thead th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:9px 14px;text-align:left;background:var(--cream);border-bottom:1px solid var(--border)}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer!important}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--cream)}
  td{padding:11px 14px;font-size:12px}
  .td-name{font-weight:500;color:var(--navy)}
  .td-sub{font-size:10px;color:var(--muted);margin-top:1px}
  .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
  .pill.pending{background:var(--abg);color:var(--amber);border:1px solid var(--abr)}
  .pill.approved{background:var(--bbg);color:var(--blue);border:1px solid var(--bbr)}
  .pill.translated{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
  .pill.rejected{background:var(--rbg);color:var(--red);border:1px solid var(--rbr)}
  .empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}

  .overlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.6);z-index:99999;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:700px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2);margin:auto}
  .modal-head{background:var(--navy);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
  .modal-head h3{font-family:'DM Serif Display',serif;color:var(--goldl);font-size:17px}
  .modal-close{background:none;border:none;color:rgba(255,255,255,0.55);font-size:20px;cursor:pointer;padding:0 2px;line-height:1}
  .modal-close:hover{color:#fff}
  .modal-body{padding:20px}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .info-item label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:2px}
  .info-item span{font-size:13px;font-weight:500;color:var(--navy)}
  .previews{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .prev-box{border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .prev-label{padding:6px 10px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;background:var(--cream);border-bottom:1px solid var(--border)}
  .prev-img{width:100%;height:160px;object-fit:contain;display:block;background:#f8f8f8}
  .prev-ph{height:160px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--muted);font-size:12px}
  .prev-ph span{font-size:28px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .btn{padding:8px 16px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
  .btn:disabled{opacity:0.45;cursor:not-allowed}
  .btn-approve{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}.btn-approve:not(:disabled):hover{background:var(--green);color:#fff}
  .btn-reject{background:var(--rbg);color:var(--red);border:1px solid var(--rbr)}.btn-reject:not(:disabled):hover{background:var(--red);color:#fff}
  .btn-translate{background:var(--navy);color:var(--goldl)}.btn-translate:not(:disabled):hover{background:var(--navy2)}
  .btn-pdf{background:var(--pbg);color:var(--purple);border:1px solid var(--pbr)}.btn-pdf:not(:disabled):hover{background:var(--purple);color:#fff}
  .btn-email{background:var(--bbg);color:var(--blue);border:1px solid var(--bbr)}.btn-email:not(:disabled):hover{background:var(--blue);color:#fff}
  .translation-out{margin-top:12px;padding:14px;background:var(--cream);border:1px solid var(--border);border-radius:8px;font-size:12px;line-height:1.8;color:var(--text);display:none;max-height:220px;overflow-y:auto;white-space:pre-wrap}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--navy);color:var(--goldl);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}

  @media(max-width:580px){.stats-bar,.table-wrap{margin:10px}.info-grid,.previews{grid-template-columns:1fr}.modal-body{padding:14px}}
</style>
</head>

        <button class="fbtn" onclick="filter('approved',this)">Approved</button>
        <button class="fbtn" onclick="filter('translated',this)">Translated</button>
        <button class="fbtn" onclick="filter('rejected',this)">Rejected</button>
      </div>
    </div>
    <table>
      <thead><tr><th>Customer</th><th>Document</th><th>Purpose</th><th>Date</th><th>Status</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No submissions yet.</div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeOuter(event)">
  <div class="modal">
    <div class="modal-head">
      <h3 id="m-title">Submission</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="info-grid">
        <div class="info-item"><label>Name</label><span id="m-name"></span></div>
        <div class="info-item"><label>Email</label><span id="m-email"></span></div>
        <div class="info-item"><label>Phone</label><span id="m-phone"></span></div>
        <div class="info-item"><label>Document</label><span id="m-doc"></span></div>
        <div class="info-item"><label>Purpose</label><span id="m-purpose"></span></div>
        <div class="info-item"><label>Submitted</label><span id="m-date"></span></div>
        <div class="info-item"><label>Status</label><span id="m-status"></span></div>
        <div class="info-item"><label>Fee</label><span>₱300</span></div>
      </div>
      <div class="previews">
        <div class="prev-box">
          <div class="prev-label">PSA document</div>
          <div id="doc-prev" class="prev-ph"><span>📄</span><span>Uploaded file</span></div>
        </div>
        <div class="prev-box">
          <div class="prev-label">Payment proof</div>
          <div id="proof-prev" class="prev-ph"><span>🧾</span><span>GCash screenshot</span></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-approve" id="b-approve" onclick="approve()">✓ Approve</button>
        <button class="btn btn-reject"  id="b-reject"  onclick="reject()">✕ Reject</button>
        <button class="btn btn-translate" id="b-translate" onclick="translate()">⚡ Translate (AI)</button>
        <button class="btn btn-pdf"   id="b-pdf"   onclick="downloadPDF()">↓ Download PDF</button>
        <button class="btn btn-email" id="b-email" onclick="sendEmail()">✉ Email customer</button>
      </div>
      <div class="translation-out" id="t-out"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PASS = 'Trainer2026';
const KEY  = '$2a$10$fO/kBOQ1AEcGiT2YVcQQ0uNmSp/Jn5Lu10yYyEMy5UL6eXY0w4BNG';
const BIN  = '6a4e1aecf5f4af5e29710ff9';

const EMAILJS_SVC  = 'service_wog8mwj';
const EMAILJS_TPL  = 'template_5l2krhk';
const EMAILJS_KEY  = 'XDm2wGz_tn8DOjWPw';

let subs = [], curFilter = 'all', activeId = null;

function doLogin() {
  if (document.getElementById('pwd').value === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    loadSubmissions();

// Event delegation for table rows - more reliable than inline onclick
document.addEventListener('click', function(e) {
  var tr = e.target.closest('tr[data-id]');
  if (tr) {
    var id = tr.getAttribute('data-id');
    if (id) openModal(id);
  }
});
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('pwd').value = '';
}

async function loadSubmissions() {
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN}/latest`, { headers:{'X-Master-Key':KEY} });
    const d = await r.json();
    subs = d.record?.submissions || [];
  } catch { subs = []; }
  render(); updateStats();
}

async function save() {
  await fetch(`https://api.jsonbin.io/v3/b/${BIN}`, {
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':KEY},
    body: JSON.stringify({ submissions: subs })
  });
}

function statusLabel(s) {
  return {pending:'⏳ Pending',approved:'✓ Approved',translated:'✅ Translated',rejected:'✕ Rejected'}[s]||s;
}

function render() {
  const tbody = document.getElementById('tbl');
  const empty = document.getElementById('empty');
  const list  = curFilter === 'all' ? subs : subs.filter(s => s.status === curFilter);
  if (!list.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = list.map(s => `
    <tr data-id="${s.id}" style="cursor:pointer;background:white" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='white'">
      <td><div class="td-name">${s.name}</div><div class="td-sub">${s.email}</div></td>
      <td>${s.doctype}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">${s.purpose}</td>
      <td style="white-space:nowrap;color:var(--muted);font-size:11px">${s.date}</td>
      <td><span class="pill ${s.status}">${statusLabel(s.status)}</span></td>
    </tr>`).join('');
  // Attach click handlers to each row
  Array.from(tbody.querySelectorAll('tr[data-id]')).forEach(function(tr) {
    tr.addEventListener('click', function() {
      openModal(this.getAttribute('data-id'));
    });
  });
}

function updateStats() {
  document.getElementById('s-total').textContent     = subs.length;
  document.getElementById('s-pending').textContent   = subs.filter(s=>s.status==='pending').length;
  document.getElementById('s-translated').textContent= subs.filter(s=>s.status==='translated').length;
  document.getElementById('s-revenue').textContent   = (subs.filter(s=>s.status!=='rejected').length*300).toLocaleString();
}

function filter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openModal(id) {
  activeId = id;
  const s = subs.find(x => x.id === id);
  if (!s) { console.log('Submission not found:', id); return; }
  document.body.style.overflow = 'hidden';
  document.getElementById('m-title').textContent   = `${s.id} · ${s.name}`;
  document.getElementById('m-name').textContent    = s.name;
  document.getElementById('m-email').textContent   = s.email;
  document.getElementById('m-phone').textContent   = s.phone;
  document.getElementById('m-doc').textContent     = s.doctype;
  document.getElementById('m-purpose').textContent = s.purpose;
  document.getElementById('m-date').textContent    = s.date;
  document.getElementById('m-status').innerHTML    = `<span class="pill ${s.status}">${statusLabel(s.status)}</span>`;

  const docPrev   = document.getElementById('doc-prev');
  const proofPrev = document.getElementById('proof-prev');

  if (s.docFile?.data) {
    const isImg = s.docFile.type.startsWith('image/');
    docPrev.innerHTML = isImg
      ? `<img class="prev-img" src="data:${s.docFile.type};base64,${s.docFile.data}" alt="PSA doc">`
      : `<div class="prev-ph"><span>📄</span><span>${s.docFile.name}</span></div>`;
  } else {
    docPrev.innerHTML = `<div class="prev-ph"><span>📄</span><span>No file</span></div>`;
  }

  if (s.proofFile?.data) {
    proofPrev.innerHTML = `<img class="prev-img" src="data:${s.proofFile.type};base64,${s.proofFile.data}" alt="Payment proof">`;
  } else {
    proofPrev.innerHTML = `<div class="prev-ph"><span>🧾</span><span>No file</span></div>`;
  }

  document.getElementById('b-approve').disabled   = s.status !== 'pending';
  document.getElementById('b-reject').disabled    = s.status === 'rejected' || s.status === 'translated';
  document.getElementById('b-translate').disabled = s.status !== 'approved';
  document.getElementById('b-pdf').disabled       = !s.translation;
  document.getElementById('b-email').disabled     = s.status !== 'translated';

  const tout = document.getElementById('t-out');
  if (s.translation) { tout.textContent = s.translation; tout.style.display = 'block'; }
  else { tout.style.display = 'none'; tout.textContent = ''; }

  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); activeId = null; document.body.style.overflow = ''; }
function closeOuter(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

async function approve() {
  const s = subs.find(x => x.id === activeId); if (!s) return;
  s.status = 'approved';
  await save(); render(); updateStats(); openModal(activeId);
  toast('✓ Payment approved');
}

async function reject() {
  if (!confirm('Reject this submission?')) return;
  const s = subs.find(x => x.id === activeId); if (!s) return;
  s.status = 'rejected';
  await save(); render(); updateStats(); openModal(activeId);
  toast('✕ Submission rejected');
}

async function translate() {
  const s = subs.find(x => x.id === activeId); if (!s) return;
  const btn = document.getElementById('b-translate');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Translating...';
  const tout = document.getElementById('t-out');
  tout.style.display = 'block';
  tout.textContent = 'Generating Japanese translation...';

  const fieldData = s.fields || {};
  const fieldList = Object.entries(fieldData)
    .filter(([k,v]) => v)
    .map(([k,v]) => k.replace(/_/g,' ') + ': ' + v)
    .join('\n');

  const prompt = 'You are a professional Japanese translator specializing in Philippine PSA civil registry documents.\n' +
    'Translate this ' + s.doctype + ' from English to Japanese.\n\n' +
    'Customer: ' + s.name + '\nPurpose: ' + (s.purpose||'') + '\n\n' +
    'Fields:\n' + fieldList + '\n\n' +
    'Format each field as: [FIELD:English Label|Japanese Label|English Value|Japanese Value]\n' +
    'Rules: Names use katakana. Dates as Japanese format (e.g. 1993年4月22日). Keep numbers unchanged.\n' +
    'After all fields add: [CERT:certification in Japanese then English]\n\n' +
    'IMPORTANT: Return ONLY the [FIELD:...] lines and [CERT:...] line. No other text. No introduction. No explanation.';

  try {
    var raw = '';

    // Call Cloudflare Worker (Llama 4 vision model)
    try {
      var parts = [{text: prompt}];
      if (s.docFile && s.docFile.data) {
        parts.push({inline_data: {mime_type: 'image/jpeg', data: s.docFile.data}});
      }
      var r1 = await fetch('https://gemini-proxy.areymar36.workers.dev', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          contents: [{parts: parts}],
          generationConfig: {temperature: 0.2, maxOutputTokens: 2000}
        })
      });
      var d1 = await r1.json();
      if (d1.error) throw new Error(d1.error.message);
      var rawVal = d1.candidates && d1.candidates[0] && d1.candidates[0].content &&
            d1.candidates[0].content.parts && d1.candidates[0].content.parts[0]
            ? d1.candidates[0].content.parts[0].text : '';
      raw = typeof rawVal === 'string' ? rawVal : JSON.stringify(rawVal);
    } catch(eg) { console.log('Worker failed:', eg.message); }

        if (!raw || raw.length < 20) {
      try {
        const encoded = encodeURIComponent(prompt);
        const r2 = await fetch('https://text.pollinations.ai/' + encoded + '?model=openai', {method:'GET'});
        if (r2.ok) {
          const t2 = (await r2.text()).trim();
          if (t2 && t2.length > 50) raw = t2;
        }
      } catch(e2) { console.log('Pollinations fallback failed:', e2.message); }
    }

    

    s.translation = raw;
    s.status = 'translated';
    tout.textContent = raw;
    await save(); render(); updateStats(); openModal(activeId);
    toast('Translation complete for ' + s.name);
  } catch(e) {
    tout.textContent = 'Translation failed: ' + (e.message || e) + '\n\nPlease try again or check your connection.';
    btn.disabled = false;
    btn.innerHTML = '⚡ Translate (AI)';
  }
}

function buildPDFContent(s) {
  const lines = s.translation.split('\n');
  const fields = [];
  let cert = '';
  for (const line of lines) {
    const fm = line.match(/\[FIELD:(.+?)\|(.+?)\|(.+?)\|(.+?)\]/);
    if (fm) fields.push({ enLbl: fm[1], jpLbl: fm[2], enVal: fm[3], jpVal: fm[4] });
    const cm = line.match(/\[CERT:(.+?)\]/);
    if (cm) cert = cm[1];
  }
  if (!fields.length) {
    fields.push({ enLbl:'Translation', jpLbl:'翻訳', enVal: s.name, jpVal: s.name });
  }
  return { fields, cert };
}

function downloadPDF() {
  const s = subs.find(x => x.id === activeId); if (!s || !s.translation) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, margin = 20, colW = 55, valW = 115;
  let y = 20;
  const navy = [26, 39, 68], gold = [201, 168, 76], gray = [107, 114, 128];
  const lightBg = [240, 237, 232], blueBg = [240, 244, 255], amberBg = [255, 251, 235];

  const titles = {
    'Birth Certificate':['出生証明書','Certificate of Live Birth'],
    'Marriage Certificate':['婚姻証明書','Marriage Certificate'],
    'Death Certificate':['死亡証明書','Death Certificate'],
    'CENOMAR':['未婚証明書（CENOMAR）','Certificate of No Marriage Record'],
    'Advisory on Marriages':['婚姻記録照会書','Advisory on Marriages'],
    'Certificate of No Birth Record':['出生記録なし証明書','Certificate of No Birth Record'],
    'Certificate of No Death Record':['死亡記録なし証明書','Certificate of No Death Record'],
  };
  const [jpTitle, enTitle] = titles[s.doctype] || ['翻訳文書', s.doctype];

  doc.setFillColor(...navy);
  doc.rect(margin, y, W - 2*margin, 0.8, 'F');
  y += 4;

  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.setTextColor(...navy);
  doc.text(jpTitle, W/2, y, { align:'center' });
  y += 7;

  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(...gray);
  doc.text(enTitle + '  —  Japanese Translation', W/2, y, { align:'center' });
  y += 5;

  doc.setDrawColor(...gold);
  doc.setLineWidth(0.6);
  doc.line(margin, y, W - margin, y);
  y += 4;

  doc.setFontSize(8);
  doc.setTextColor(...gray);
  doc.text(`Ref. No.: ${s.id}`, margin, y);
  doc.text(`Date: ${new Date().toLocaleDateString('en-PH')}`, W - margin, y, { align:'right' });
  y += 8;

  const { fields, cert } = buildPDFContent(s);

  for (const f of fields) {
    const rowH = 10;
    doc.setFillColor(...lightBg);
    doc.rect(margin, y, colW, rowH, 'F');
    doc.setDrawColor(229, 224, 216);
    doc.setLineWidth(0.3);
    doc.rect(margin, y, W - 2*margin, rowH);

    doc.setFont('helvetica','bold');
    doc.setFontSize(7.5);
    doc.setTextColor(...gray);
    doc.text(f.enLbl, margin + 2, y + 4);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.text(f.jpLbl, margin + 2, y + 8);

    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor(...navy);
    const enTrunc = f.enVal.length > 40 ? f.enVal.substring(0,38)+'…' : f.enVal;
    doc.text(enTrunc, margin + colW + 2, y + 4);
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(30,30,30);
    const jpTrunc = f.jpVal.length > 35 ? f.jpVal.substring(0,33)+'…' : f.jpVal;
    doc.text(jpTrunc, margin + colW + 2, y + 8.5);
    y += rowH;
    if (y > 250) { doc.addPage(); y = 20; }
  }
  y += 6;

  const certText = cert || `本翻訳は${s.doctype}を忠実に日本語に翻訳したものです。This is a faithful Japanese translation of the original ${s.doctype} issued by the Philippine Statistics Authority (PSA).`;
  doc.setFillColor(...blueBg);
  doc.rect(margin, y, W - 2*margin, 22, 'F');
  doc.setDrawColor(191, 219, 254);
  doc.setLineWidth(0.5);
  doc.rect(margin, y, W - 2*margin, 22);
  doc.setFont('helvetica','normal');
  doc.setFontSize(7.5);
  doc.setTextColor(...navy);
  const certLines = doc.splitTextToSize(certText, W - 2*margin - 6);
  doc.text(certLines, margin + 3, y + 5);
  y += 28;

  doc.setFillColor(...amberBg);
  doc.rect(margin, y, W - 2*margin, 20, 'F');
  doc.setDrawColor(253, 230, 138);
  doc.rect(margin, y, W - 2*margin, 20);
  doc.setFontSize(7);
  doc.setTextColor(146, 64, 14);
  const disc = 'ACCEPTED USE: Suitable for Japanese visa applications and marriage registration at a Japanese municipal office (役所). NOT valid for court proceedings or notarized legal submissions.';
  const discLines = doc.splitTextToSize(disc, W - 2*margin - 6);
  doc.text(discLines, margin + 3, y + 5);

  doc.save(`${s.id}-${s.doctype.replace(/ /g,'-')}-JP.pdf`);
  toast('↓ PDF downloaded');
}

async function sendEmail() {
  const s = subs.find(x => x.id === activeId); if (!s || !s.translation) return;
  const btn = document.getElementById('b-email');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Sending…';
  try {
    await emailjs.init(EMAILJS_KEY);
    await emailjs.send(EMAILJS_SVC, EMAILJS_TPL, {
      to_email:      s.email,
      customer_name: s.name,
      doc_type:      s.doctype,
      ref_no:        s.id,
      purpose:       s.purpose,
    });
    s.status = 'translated';
    await save();
    toast('✉ Email sent to ' + s.email);
    btn.innerHTML = '✉ Email customer';
    btn.disabled = false;
  } catch(e) {
    toast('Email failed: ' + (e.text || e.message));
    btn.innerHTML = '✉ Email customer';
    btn.disabled = false;
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</body>
</html>
